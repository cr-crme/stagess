name: stagess_common_flutter
description: "Common resources shared between the admin and user apps of Stagess"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.1.5+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  stagess_common:
    path: ../stagess_common
  intl: ^0.20.2
  provider: ^6.0.3
  enhanced_containers_foundation:
  enhanced_containers:
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  firebase_auth_mocks: ^0.15.1
  web_socket_client: ^0.2.0
  flutter_map: ^8.2.2
  latlong2: ^0.10.1
  url_launcher: ^6.1.10
  logging: ^1.3.0
  collection: ^1.16.0
  http: ^1.6.0
  image_picker: ^1.1.2
  pdf: ^3.10.1
  printing: ^5.10.3
  shared_preferences: ^2.2.0

dependency_overrides:
  enhanced_containers_foundation:
    path: ../external/enhanced_containers/plugins/enhanced_containers_foundation
  enhanced_containers:
    path: ../external/enhanced_containers/

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/risks-data.json
    - assets/questions.json
    - assets/visa_background_front.svg
    - assets/visa_background_left.svg
    - assets/visa_background_right.svg